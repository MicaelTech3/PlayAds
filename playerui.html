<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PyAds Player</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --green: #1db954;
    --green-dim: rgba(29,185,84,.12);
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --surface3: #2a2a2a;
    --border: rgba(255,255,255,.07);
    --text: #ffffff;
    --muted: #888;
    --danger: #ff4444;
    --warn: #f59e0b;
    --font: 'Figtree', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── Titlebar drag ── */
  #titlebar {
    height: 38px;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    -webkit-app-region: drag;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #titlebar svg { -webkit-app-region: no-drag; }
  #titlebar-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .5px;
    text-transform: uppercase;
    flex: 1;
  }
  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #444;
    transition: background .4s;
    flex-shrink: 0;
  }
  #status-dot.online  { background: var(--green); box-shadow: 0 0 8px rgba(29,185,84,.5); }
  #status-dot.playing { background: var(--warn);  box-shadow: 0 0 8px rgba(245,158,11,.5); }
  #status-dot.error   { background: var(--danger); }

  /* ── Main layout ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 16px;
    overflow: hidden;
  }

  /* ── Now Playing ── */
  #now-playing-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  #now-playing-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 110% 50%, rgba(29,185,84,.06) 0%, transparent 70%);
    pointer-events: none;
  }
  #np-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #np-label .eq {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 12px;
  }
  #np-label .eq span {
    display: block;
    width: 2px;
    background: var(--green);
    border-radius: 1px;
    animation: eq 1.2s ease-in-out infinite;
  }
  #np-label .eq span:nth-child(1) { height: 40%; animation-delay: 0s; }
  #np-label .eq span:nth-child(2) { height: 80%; animation-delay: .2s; }
  #np-label .eq span:nth-child(3) { height: 55%; animation-delay: .4s; }
  #np-label .eq span:nth-child(4) { height: 90%; animation-delay: .15s; }
  @keyframes eq {
    0%,100% { transform: scaleY(.4); }
    50%      { transform: scaleY(1); }
  }
  #np-label.idle .eq span { animation-play-state: paused; opacity: .3; }
  #np-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #np-meta {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    display: flex;
    gap: 14px;
  }
  #np-meta span { display: flex; align-items: center; gap: 4px; }

  /* Progress bar */
  #progress-wrap {
    margin-top: 16px;
  }
  #progress-track {
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  #progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    width: 0%;
    transition: width .5s linear;
  }
  #progress-times {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* ── Stats row ── */
  #stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .8px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-value {
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    font-family: var(--mono);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.warn  { color: var(--warn); }

  /* ── Queue ── */
  #queue-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #queue-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  #queue-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: .8px;
    text-transform: uppercase;
  }
  #queue-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  #queue-list::-webkit-scrollbar { width: 3px; }
  #queue-list::-webkit-scrollbar-track { background: transparent; }
  #queue-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }
  .queue-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 7px;
    transition: background .15s;
  }
  .queue-item:hover { background: var(--surface2); }
  .queue-item.active {
    background: var(--green-dim);
    border: 1px solid rgba(29,185,84,.2);
  }
  .queue-num {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }
  .queue-item.active .queue-num { color: var(--green); }
  .queue-name {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .queue-item.active .queue-name { color: var(--green); }
  .queue-loops {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    flex-shrink: 0;
  }
  .queue-time {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    flex-shrink: 0;
  }
  .queue-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
  }
  .queue-empty svg { opacity: .3; }

  /* ── Bottom controls ── */
  #controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 700;
    font-family: var(--font);
    gap: 6px;
    transition: all .15s;
    white-space: nowrap;
  }
  .ctrl-btn:hover  { background: var(--surface3); }
  .ctrl-btn:active { transform: scale(.97); }
  .ctrl-btn.green  { background: var(--green); color: #000; border-color: var(--green); }
  .ctrl-btn.green:hover { background: #1ed760; }
  .ctrl-btn.danger { border-color: rgba(255,68,68,.3); color: var(--danger); }
  .ctrl-btn.danger:hover { background: rgba(255,68,68,.1); }
  #ctrl-spacer { flex: 1; }

  /* ── Firebase config overlay ── */
  #config-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  #config-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
  }
  #config-box h2 {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  #config-box p {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .cfg-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .cfg-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .cfg-input {
    background: var(--surface2);
    border: 1px solid var(--surface3);
    border-radius: 7px;
    color: var(--text);
    font-size: 12px;
    padding: 10px 12px;
    outline: none;
    font-family: var(--mono);
    transition: border-color .2s;
  }
  .cfg-input:focus { border-color: var(--green); }
  #cfg-save {
    width: 100%;
    background: var(--green);
    border: none;
    border-radius: 30px;
    color: #000;
    font-size: 14px;
    font-weight: 800;
    padding: 13px;
    cursor: pointer;
    font-family: var(--font);
    margin-top: 6px;
    transition: background .15s;
  }
  #cfg-save:hover { background: #1ed760; }

  /* ── Animations ── */
  @keyframes fadein { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
  .fadein { animation: fadein .3s ease both; }
</style>
</head>
<body>

<!-- Titlebar -->
<div id="titlebar">
  <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="20" fill="#1db954"/>
    <path d="M9 15c6-3 14-3 22 0M11 20c5-2 13-2 18 0M13 25c4-2 10-2 14 0" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <span id="titlebar-title">PyAds Player</span>
  <div id="status-dot"></div>
  <span id="status-text" style="font-size:11px;color:var(--muted);font-family:var(--mono)">Conectando...</span>
</div>

<!-- Main -->
<div id="main">

  <!-- Now Playing -->
  <div id="now-playing-card" class="fadein">
    <div id="np-label" class="idle">
      <div class="eq">
        <span></span><span></span><span></span><span></span>
      </div>
      Aguardando
    </div>
    <div id="np-title">Nenhuma mídia</div>
    <div id="np-meta">
      <span id="np-playlist">—</span>
      <span id="np-loop-info">—</span>
    </div>
    <div id="progress-wrap">
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div id="progress-times">
        <span id="time-cur">0:00</span>
        <span id="time-tot">0:00</span>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div id="stats" class="fadein" style="animation-delay:.05s">
    <div class="stat-card">
      <div class="stat-label">Playlist Ativa</div>
      <div class="stat-value" id="stat-playlist" style="font-size:14px;font-family:var(--font)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Faixas</div>
      <div class="stat-value" id="stat-tracks">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Status</div>
      <div class="stat-value green" id="stat-status">Pronto</div>
    </div>
  </div>

  <!-- Queue -->
  <div id="queue-section" class="fadein" style="animation-delay:.1s">
    <div id="queue-header">
      <span id="queue-title">Fila de reprodução</span>
    </div>
    <div id="queue-list">
      <div class="queue-empty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM21 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
        </svg>
        <span>Playlist vazia</span>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls" class="fadein" style="animation-delay:.15s">
    <button class="ctrl-btn green" id="btn-play" onclick="cmdPlayNow()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3l14 9-14 9V3z"/></svg>
      Tocar Agora
    </button>
    <button class="ctrl-btn danger" id="btn-stop" onclick="cmdStop()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
      Parar
    </button>
    <div id="ctrl-spacer"></div>
    <button class="ctrl-btn" onclick="openConfig()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Config
    </button>
  </div>
</div>

<!-- Config overlay -->
<div id="config-overlay">
  <div id="config-box">
    <h2>Configuração Firebase</h2>
    <p>Cole as credenciais do seu projeto Firebase para conectar o player.</p>
    <div class="cfg-field">
      <label class="cfg-label">API Key</label>
      <input class="cfg-input" id="cfg-apiKey" placeholder="AIzaSy..."/>
    </div>
    <div class="cfg-field">
      <label class="cfg-label">Auth Domain</label>
      <input class="cfg-input" id="cfg-authDomain" placeholder="seu-projeto.firebaseapp.com"/>
    </div>
    <div class="cfg-field">
      <label class="cfg-label">Database URL</label>
      <input class="cfg-input" id="cfg-dbUrl" placeholder="https://seu-projeto-default-rtdb.firebaseio.com"/>
    </div>
    <div class="cfg-field">
      <label class="cfg-label">Project ID</label>
      <input class="cfg-input" id="cfg-projectId" placeholder="seu-projeto"/>
    </div>
    <button id="cfg-save" onclick="saveConfig()">Conectar</button>
  </div>
</div>

<script>
// ── Config persistence ──────────────────────────────
const STORAGE_KEY = 'pyads_cfg';
let fbApp = null, fbDb = null;
let currentPlaylist = null;
let currentItemIndex = -1;
let progressInterval = null;
let startTime = null;
let totalDuration = null;

function loadConfig() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function saveConfig() {
  const cfg = {
    apiKey:      document.getElementById('cfg-apiKey').value.trim(),
    authDomain:  document.getElementById('cfg-authDomain').value.trim(),
    databaseURL: document.getElementById('cfg-dbUrl').value.trim(),
    projectId:   document.getElementById('cfg-projectId').value.trim(),
  };
  if (!cfg.apiKey || !cfg.databaseURL) {
    alert('Preencha pelo menos API Key e Database URL.');
    return;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  document.getElementById('config-overlay').style.display = 'none';
  initFirebase(cfg);
}

function openConfig() {
  const cfg = loadConfig();
  if (cfg) {
    document.getElementById('cfg-apiKey').value     = cfg.apiKey || '';
    document.getElementById('cfg-authDomain').value = cfg.authDomain || '';
    document.getElementById('cfg-dbUrl').value      = cfg.databaseURL || '';
    document.getElementById('cfg-projectId').value  = cfg.projectId || '';
  }
  document.getElementById('config-overlay').style.display = 'flex';
}

// ── Firebase init ────────────────────────────────────
function initFirebase(cfg) {
  try {
    if (fbApp) {
      fbApp.delete();
      fbApp = null; fbDb = null;
    }
    fbApp = firebase.initializeApp(cfg, 'player-ui-' + Date.now());
    fbDb  = firebase.database(fbApp);
    setStatus('online', 'Conectado');
    setupListeners();
  } catch(e) {
    setStatus('error', 'Erro Firebase');
    console.error(e);
  }
}

// ── Status ───────────────────────────────────────────
function setStatus(type, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = type;
  txt.textContent = text;
}

// ── Listeners ────────────────────────────────────────
function setupListeners() {
  if (!fbDb) return;

  // Escuta comandos/play_now
  fbDb.ref('comandos/play_now').on('value', snap => {
    const data = snap.val();
    if (!data || data.executado) return;
    const plId = data.playlist_id;
    fbDb.ref('playlists/' + plId).once('value', plSnap => {
      const pl = plSnap.val();
      if (pl) loadPlaylist(pl);
    });
  });

  // Escuta comandos/stop
  fbDb.ref('comandos/stop').on('value', snap => {
    const data = snap.val();
    if (!data || data.executado) return;
    stopPlayback();
  });

  // Escuta playlists ativas para mostrar na fila
  fbDb.ref('playlists').on('value', snap => {
    const all = snap.val() || {};
    const ativos = Object.values(all).filter(p => p && p.ativa);
    const total  = ativos.reduce((s, p) => s + (p.itens?.length || 0), 0);
    document.getElementById('stat-tracks').textContent = total;
  });
}

// ── Carrega playlist na UI ────────────────────────────
function loadPlaylist(pl) {
  currentPlaylist   = pl;
  currentItemIndex  = 0;
  const itens = pl.itens || [];

  document.getElementById('stat-playlist').textContent = pl.nome || '—';
  document.getElementById('stat-tracks').textContent   = itens.length;
  document.getElementById('stat-status').textContent   = 'Reproduzindo';
  document.getElementById('stat-status').className     = 'stat-value warn';

  renderQueue(itens, 0);
  playItem(itens, 0, pl.nome);
}

function renderQueue(itens, activeIdx) {
  const list = document.getElementById('queue-list');
  if (!itens || itens.length === 0) {
    list.innerHTML = '<div class="queue-empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM21 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg><span>Playlist vazia</span></div>';
    return;
  }
  list.innerHTML = itens.map((item, i) => `
    <div class="queue-item${i === activeIdx ? ' active' : ''}">
      <span class="queue-num">${i + 1}</span>
      <span class="queue-name">${item.nome || 'Sem nome'}</span>
      ${item.horario ? `<span class="queue-time">⏰ ${item.horario}</span>` : ''}
      ${(item.loops || 1) > 1 ? `<span class="queue-loops">${item.loops}×</span>` : ''}
    </div>
  `).join('');
}

// ── Playback simulado na UI ───────────────────────────
function playItem(itens, idx, playlistNome) {
  if (!itens || idx >= itens.length) {
    finishPlayback();
    return;
  }
  currentItemIndex = idx;
  const item  = itens[idx];
  const loops = item.loops || 1;

  renderQueue(itens, idx);
  setNowPlaying(item.nome, playlistNome, loops, idx + 1, itens.length);
  setStatus('playing', 'Reproduzindo');
  startProgress(item);

  // Simula duração (a reprodução real é no Python, aqui só mostramos estado)
  // Usa duração estimada de 30s se não disponível, ou espera pelo próximo item
}

function setNowPlaying(nome, playlist, loops, num, total) {
  const label = document.getElementById('np-label');
  label.className = '';
  label.innerHTML = `<div class="eq"><span></span><span></span><span></span><span></span></div> Reproduzindo`;
  document.getElementById('np-title').textContent    = nome || '—';
  document.getElementById('np-playlist').textContent = playlist || '—';
  document.getElementById('np-loop-info').textContent = loops > 1
    ? `Loop ${loops}× · ${num}/${total}`
    : `Faixa ${num} de ${total}`;
}

function startProgress(item) {
  clearInterval(progressInterval);
  startTime     = Date.now();
  totalDuration = 30000; // default estimado

  progressInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const pct     = Math.min(100, (elapsed / totalDuration) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-cur').textContent = fmtTime(elapsed / 1000);
    document.getElementById('time-tot').textContent = fmtTime(totalDuration / 1000);
  }, 500);
}

function stopPlayback() {
  clearInterval(progressInterval);
  currentPlaylist  = null;
  currentItemIndex = -1;

  const label = document.getElementById('np-label');
  label.className = 'idle';
  label.innerHTML = `<div class="eq"><span></span><span></span><span></span><span></span></div> Aguardando`;

  document.getElementById('np-title').textContent     = 'Nenhuma mídia';
  document.getElementById('np-playlist').textContent  = '—';
  document.getElementById('np-loop-info').textContent = '—';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-cur').textContent = '0:00';
  document.getElementById('time-tot').textContent = '0:00';
  document.getElementById('stat-status').textContent  = 'Parado';
  document.getElementById('stat-status').className    = 'stat-value';
  document.getElementById('queue-list').innerHTML = '<div class="queue-empty"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM21 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg><span>Playlist vazia</span></div>';
  setStatus('online', 'Pronto');
}

function finishPlayback() {
  clearInterval(progressInterval);
  document.getElementById('stat-status').textContent = 'Concluído';
  document.getElementById('stat-status').className   = 'stat-value green';
  setStatus('online', 'Pronto');
}

// ── Comandos manuais ──────────────────────────────────
async function cmdPlayNow() {
  if (!fbDb) { alert('Firebase não conectado.'); return; }
  // Pega primeira playlist ativa
  const snap = await fbDb.ref('playlists').once('value');
  const all  = snap.val() || {};
  const entry = Object.entries(all).find(([,p]) => p && p.ativa);
  if (!entry) { alert('Nenhuma playlist ativa encontrada.'); return; }
  const [plId, pl] = entry;
  await fbDb.ref('comandos/play_now').set({
    playlist_id: plId,
    timestamp:   Date.now(),
    executado:   false
  });
  await fbDb.ref('playlists/' + plId).update({ play_now: Date.now() });
  loadPlaylist(pl);
}

async function cmdStop() {
  if (!fbDb) return;
  await fbDb.ref('comandos/stop').set({ timestamp: Date.now(), executado: false });
  stopPlayback();
}

// ── Utilitários ───────────────────────────────────────
function fmtTime(secs) {
  if (!secs || isNaN(secs)) return '0:00';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// ── Init ──────────────────────────────────────────────
(function() {
  const cfg = loadConfig();
  if (cfg && cfg.apiKey && cfg.databaseURL) {
    document.getElementById('config-overlay').style.display = 'none';
    document.getElementById('cfg-apiKey').value     = cfg.apiKey;
    document.getElementById('cfg-authDomain').value = cfg.authDomain || '';
    document.getElementById('cfg-dbUrl').value      = cfg.databaseURL;
    document.getElementById('cfg-projectId').value  = cfg.projectId || '';
    initFirebase(cfg);
  }
})();
</script>
